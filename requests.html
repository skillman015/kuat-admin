<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Заявки</title>
    <script src="static/js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
    /* --- БАЗОВЫЕ СТИЛИ (ОСТАВЛЕНЫ БЕЗ ИЗМЕНЕНИЙ) --- */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', sans-serif;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background-color: #f4f7f6; /* Чуть мягче фон для контраста с таблицей */
        color: #333;
        display: flex;
        min-height: 100vh;
        overflow-x: hidden;
    }

    h1 { font-size: 24px; margin-bottom: 25px; font-weight: 600; }

    /* --- САЙДБАР (ВАШ СТИЛЬ) --- */
    .sidebar {
        width: 280px;
        background-color: #fff;
        border-right: 1px solid #eee;
        display: flex;
        flex-direction: column;
        padding: 30px 20px;
        position: fixed;
        height: 100vh;
        left: 0; top: 0;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 3000;
    }

    .sidebar-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.4);
        z-index: 2500;
    }

    .sidebar-overlay.active { display: block; }

    .sidebar-header {
        font-weight: 600;
        font-size: 14px;
        color: #aaa;
        letter-spacing: 1.5px;
        margin-bottom: 30px;
        padding-left: 15px;
    }

    .sidebar-menu { list-style: none; flex-grow: 1; }
    .sidebar-menu li { margin-bottom: 8px; }
    .sidebar-menu a {
        text-decoration: none;
        color: #555;
        font-size: 15px;
        font-weight: 500;
        padding: 14px 18px;
        display: block;
        border-radius: 10px;
        transition: 0.2s;
    }

    .sidebar-menu a.active-link { background-color: #000; color: #fff; }
    .sidebar-menu a:hover:not(.active-link) { background-color: #f0f0f0; }

    .logout-btn {
        width: 100%;
        background-color: #f0f0f0;
        color: #ff4444;
        padding: 14px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        margin-top: 20px;
    }

    /* --- ОСНОВНОЙ КОНТЕНТ --- */
    .main-content {
        flex-grow: 1;
        margin-left: 280px;
        padding: 40px;
        transition: 0.3s;
        width: 100%;
    }

    .mobile-header {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        background: #fff;
        padding: 15px 20px;
        border-bottom: 1px solid #eee;
        z-index: 2000;
        justify-content: space-between;
        align-items: center;
        height: 70px;
    }

    .burger {
        width: 40px; height: 40px;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        gap: 5px; cursor: pointer;
    }
    .burger span { width: 24px; height: 2px; background: #000; border-radius: 2px; }

    /* --- НОВЫЙ СТИЛЬ ТАБЛИЦЫ (CRM STYLE) --- */
    .table-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        border: 1px solid #e2e8f0;
        overflow: hidden;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
    }

    th {
        background: #f8fafc;
        padding: 16px 24px;
        font-size: 12px;
        font-weight: 600;
        color: #718096;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid #e2e8f0;
    }

    td {
        padding: 18px 24px;
        border-bottom: 1px solid #edf2f7;
        font-size: 14px;
        vertical-align: middle;
    }

    tr:hover td { background-color: #f9fafb; }

    /* Статусы */
    .status-badge {
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        display: inline-block;
    }
    .status-new { background: #feebc8; color: #975a16; }
    .status-done { background: #c6f6d5; color: #22543d; }

    /* Контент внутри ячеек */
    .client-name { font-weight: 600; color: #2d3748; display: block; }
    .client-company { font-size: 12px; color: #718096; }
    .contact-link { color: #3182ce; text-decoration: none; font-size: 13px; }
    .msg-text { color: #4a5568; line-height: 1.5; font-size: 13px; max-width: 300px; display: block; }

    /* --- ФУТЕР ТАБЛИЦЫ --- */
    .table-footer {
        padding: 20px 24px;
        background: #f8fafc;
        border-top: 1px solid #e2e8f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .total-info { font-size: 13px; color: #64748b; }

    .pagination-btns { display: flex; gap: 8px; }

    .page-btn {
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
        background: #fff;
        color: #4a5568;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }

    .page-btn:hover { border-color: #cbd5e0; background: #f7fafc; }
    .page-btn.active { background: #000; color: #fff; border-color: #000; }

    /* Шапка с кнопками */
    .header-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        gap: 15px;
    }

    .btn-group { display: flex; gap: 10px; }

    .btn-action {
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #e2e8f0;
    }

    .btn-primary { background: #000; color: #fff; border: 1px solid #000; }
    .btn-primary:hover { background: #333; }
    .btn-secondary { background: #fff; color: #4a5568; }
    .btn-secondary:hover { background: #f8fafc; }

    /* Модальное окно */
    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 4000;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(4px);
    }
    .modal.active { display: flex; }
    .modal-content {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        width: 100%;
        max-width: 500px;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    .full-width { grid-column: span 2; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; color: #a0aec0; text-transform: uppercase; margin-bottom: 5px; }
    .form-input {
        width: 100%;
        padding: 12px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
    }
    .form-input:focus { border-color: #000; }

    /* --- АДАПТИВНОСТЬ (ВАША МЕХАНИКА + НОВЫЕ СТИЛИ) --- */
    @media (max-width: 992px) {
        .sidebar { transform: translateX(-100%); }
        .sidebar.active { transform: translateX(0); box-shadow: 15px 0 30px rgba(0,0,0,0.1); }
        .main-content { margin-left: 0; padding: 100px 20px 40px; }
        .mobile-header { display: flex; }
    }

    @media (max-width: 768px) {
        th { display: none; }
        td {
            display: block;
            padding: 12px 24px;
            border: none;
            text-align: right;
            position: relative;
        }
        td::before {
            content: attr(data-label);
            position: absolute;
            left: 24px;
            font-weight: 600;
            color: #a0aec0;
            text-transform: uppercase;
            font-size: 10px;
            top: 14px;
        }
        tr { border-bottom: 8px solid #f4f7f6; display: block; padding: 10px 0; }
        .table-footer { flex-direction: column; gap: 15px; text-align: center; }
        .msg-text { max-width: 100%; text-align: right; }
    }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay"></div>

    <div class="mobile-header">
        <span style="font-weight: 600; font-size: 16px;">KUAT ADMIN</span>
        <div class="burger" id="burgerBtn">
            <span></span><span></span><span></span>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">KUAT SOLUTIONS</div>
        <ul class="sidebar-menu">
            <li><a href="main_page.html">Панель управления</a></li>
            <li><a href="main.html">Главная страница</a></li>
            <li><a href="category.html">Категории продуктов</a></li>
            <li><a href="products.html">Продукты</a></li>
            <li><a href="requests.html" class="active-link">Заявки</a></li>
            <li><a href="footer.html">Footer / Контакты</a></li>
            <li><a href="partners.html">Партнеры</a></li>
            <li><a href="change_password.html">Смена пароля</a></li>
        </ul>
        <button class="logout-btn" onclick="handleLogout()">Выйти из системы</button>
    </aside>

    <main class="main-content">
        <div class="header-actions">
            <h1>Входящие заявки</h1>
            <div class="btn-group">
                <button class="btn-action btn-secondary" onclick="exportToExcel()">
                    Скачать в Excel
                </button>
                <button class="btn-action btn-primary" onclick="openModal()">
                    + Создать заявку
                </button>
            </div>
        </div>
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th style="width: 70px;">ID</th>
                        <th>Клиент / Компания</th>
                        <th>Контакты</th>
                        <th>Сообщение</th>
                        <th>Дата</th>
                        <th style="text-align: center;">Статус</th>
                    </tr>
                </thead>
                <tbody id="requests-body">
                    </tbody>
            </table>

            <div class="table-footer">
                <div class="total-info">
                    Показано <strong id="current-count">0</strong> из <strong id="total-count">0</strong> заявок
                </div>
                <div class="pagination-btns" id="pagination">
                    </div>
            </div>
        </div>

        <div class="modal" id="modal">
            <div class="modal-content">
                <h2 style="font-size: 18px;">Новая заявка</h2>
                <form id="requestForm" class="form-grid">
                    <div class="form-group"><label>Имя</label><input type="text" name="first_name" class="form-input" required></div>
                    <div class="form-group"><label>Фамилия</label><input type="text" name="last_name" class="form-input" required></div>
                    <div class="form-group full-width"><label>Компания</label><input type="text" name="company" class="form-input"></div>
                    <div class="form-group"><label>Email</label><input type="email" name="email" class="form-input" required></div>
                    <div class="form-group"><label>Телефон</label><input type="text" name="phone" class="form-input" required></div>
                    <div class="form-group full-width"><label>Адрес</label><input type="text" name="address" class="form-input"></div>
                    <div class="form-group full-width"><label>Сообщение</label><textarea name="message" class="form-input" rows="3"></textarea></div>
                    <div class="full-width" style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
                        <button type="button" class="btn-action btn-secondary" onclick="closeModal()">Отмена</button>
                        <button type="submit" class="btn-action btn-primary">Создать</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
    // Константы
const API_REQUESTS = 'https://kuat-admin.com/api/requests/';
const ITEMS_PER_PAGE = 10;

// Глобальные переменные для данных
let allRequestsData = [];

// --- МЕНЮ ---
const burgerBtn = document.getElementById('burgerBtn');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

function toggleMenu() {
    sidebar.classList.toggle('active');
    overlay.classList.toggle('active');
}
burgerBtn?.addEventListener('click', toggleMenu);
overlay?.addEventListener('click', toggleMenu);

// --- УПРАВЛЕНИЕ МОДАЛЬНЫМ ОКНОМ ---
const modal = document.getElementById('modal');

function openModal() {
    modal.classList.add('active');
}

function closeModal() {
    modal.classList.remove('active');
    document.getElementById('requestForm').reset();
}

// Закрытие модалки при клике на серый фон
modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
});

// --- ЗАГРУЗКА ДАННЫХ ---
async function loadRequests(page = 1) {
    try {
        const res = await authorizedFetch(API_REQUESTS);
        if (!res || !res.ok) throw new Error("API error");
        const data = await res.json();

        // Сохраняем все данные для последующего экспорта в Excel
        allRequestsData = Array.isArray(data) ? data : data.results;

        const total = allRequestsData.length;
        document.getElementById('total-count').textContent = total;

        // Локальная пагинация
        const start = (page - 1) * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        const paginatedItems = allRequestsData.slice(start, end);

        document.getElementById('current-count').textContent = paginatedItems.length;

        renderTable(paginatedItems);
        renderPagination(total, page);
    } catch (e) {
        console.error("Ошибка загрузки:", e);
        document.getElementById('requests-body').innerHTML =
            '<tr><td colspan="6" style="text-align:center; padding:50px; color:#a0aec0;">Ошибка загрузки данных</td></tr>';
    }
}

// --- ОТРИСОВКА ТАБЛИЦЫ ---
function renderTable(list) {
    const tbody = document.getElementById('requests-body');
    if (list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:50px;">Заявок нет</td></tr>';
        return;
    }

    tbody.innerHTML = list.map(req => {
        const date = new Date(req.created_at).toLocaleDateString('ru-RU', {
            day: '2-digit', month: '2-digit', year: '2-digit',
            hour: '2-digit', minute: '2-digit'
        });
        const statusClass = req.is_processed ? 'status-done' : 'status-new';
        const statusText = req.is_processed ? 'Обработано' : 'Новая';

        return `
            <tr>
                <td data-label="ID" style="color: #cbd5e0; font-weight: 600;">#${req.id}</td>
                <td data-label="Клиент">
                    <span class="client-name">${req.first_name} ${req.last_name}</span>
                    <span class="client-company">${req.company || 'Частное лицо'}</span>
                </td>
                <td data-label="Контакты">
                    <a href="mailto:${req.email}" class="contact-link">${req.email}</a><br>
                    <span style="font-size: 12px; color: #718096;">${req.phone}</span>
                </td>
                <td data-label="Сообщение">
                    <span class="msg-text">${req.message || '—'}</span>
                </td>
                <td data-label="Дата" style="color: #718096; white-space: nowrap;">${date}</td>
                <td data-label="Статус" style="text-align: center;">
                    <span class="status-badge ${statusClass}">${statusText}</span>
                </td>
            </tr>
        `;
    }).join('');
}

// --- ПАГИНАЦИЯ ---
function renderPagination(total, current) {
    const nav = document.getElementById('pagination');
    const pagesCount = Math.ceil(total / ITEMS_PER_PAGE);
    nav.innerHTML = '';

    if (pagesCount <= 1) return;

    for (let i = 1; i <= pagesCount; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = `page-btn ${i === current ? 'active' : ''}`;
        btn.onclick = () => {
            window.scrollTo({top: 0, behavior: 'smooth'});
            loadRequests(i);
        };
        nav.appendChild(btn);
    }
}

// --- ДОБАВЛЕНИЕ ЗАЯВКИ (POST) ---
document.getElementById('requestForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btnSubmit = e.target.querySelector('button[type="submit"]');
    const originalBtnText = btnSubmit.textContent;

    // Блокируем кнопку
    btnSubmit.disabled = true;
    btnSubmit.textContent = 'Создание...';

    const formData = new FormData(e.target);
    const payload = Object.fromEntries(formData.entries());

    try {
        const res = await authorizedFetch(API_REQUESTS, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        if (res && res.ok) {
            closeModal();
            loadRequests(1); // Перезагружаем первую страницу
        } else {
            const errData = await res.json();
            alert('Ошибка при создании: ' + JSON.stringify(errData));
        }
    } catch (err) {
        console.error(err);
        alert('Ошибка сети или сервера');
    } finally {
        btnSubmit.disabled = false;
        btnSubmit.textContent = originalBtnText;
    }
});

// --- СКАЧИВАНИЕ В EXCEL ---
function exportToExcel() {
    if (allRequestsData.length === 0) {
        alert("Нет данных для экспорта");
        return;
    }

    // Преобразуем данные в удобный для таблицы вид
    const preparedData = allRequestsData.map(req => ({
        "ID": req.id,
        "Имя": req.first_name,
        "Фамилия": req.last_name,
        "Компания": req.company || "Частное лицо",
        "Email": req.email,
        "Телефон": req.phone,
        "Адрес": req.address || "—",
        "Сообщение": req.message || "—",
        "Статус": req.is_processed ? "Обработано" : "Новая",
        "Дата создания": new Date(req.created_at).toLocaleString('ru-RU')
    }));

    // Создаем рабочую книгу XLSX
    const worksheet = XLSX.utils.json_to_sheet(preparedData);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Заявки");

    // Скачиваем файл
    XLSX.writeFile(workbook, `Kuat_Requests_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// --- ВЫХОД ---
function handleLogout() {
    localStorage.clear();
    window.location.href = 'index.html';
}

// Старт
document.addEventListener('DOMContentLoaded', () => loadRequests(1));
</script>
</body>
</html>
