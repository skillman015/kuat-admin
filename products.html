<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Продукты</title>
    <script src="static/js/auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- БАЗОВЫЕ СТИЛИ --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 { font-size: 24px; margin-bottom: 25px; font-weight: 600; }

        /* --- САЙДБАР --- */
        .sidebar {
            width: 280px;
            background-color: #fff;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            left: 0; top: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3000;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 2500;
        }

        .sidebar-overlay.active { display: block; }

        .sidebar-header {
            font-weight: 600;
            font-size: 14px;
            color: #aaa;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            padding-left: 15px;
        }

        .sidebar-menu { list-style: none; flex-grow: 1; }
        .sidebar-menu li { margin-bottom: 8px; }
        .sidebar-menu a {
            text-decoration: none;
            color: #555;
            font-size: 15px;
            font-weight: 500;
            padding: 14px 18px;
            display: block;
            border-radius: 10px;
            transition: 0.2s;
        }

        .sidebar-menu a.active-link { background-color: #000; color: #fff; }
        .sidebar-menu a:hover:not(.active-link) { background-color: #f0f0f0; }

        .logout-btn {
            width: 100%;
            background-color: #f0f0f0;
            color: #ff4444;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            margin-top: 20px;
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        .main-content {
            flex-grow: 1;
            margin-left: 280px;
            padding: 40px;
            transition: 0.3s;
            width: 100%;
        }

        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            background: #fff;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            z-index: 2000;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .burger {
            width: 40px; height: 40px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 5px; cursor: pointer;
        }
        .burger span { width: 24px; height: 2px; background: #000; border-radius: 2px; }

        /* --- ТАБЛИЦА (CRM STYLE) --- */
        .table-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f8fafc;
            padding: 16px 24px;
            font-size: 12px;
            font-weight: 600;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 18px 24px;
            border-bottom: 1px solid #edf2f7;
            font-size: 14px;
            vertical-align: middle;
        }

        tr:hover td { background-color: #f9fafb; }

        /* Контент категорий */
        .cat-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        .cat-name { font-weight: 600; color: #2d3748; display: block; margin-bottom: 4px; }
        .cat-desc { font-size: 13px; color: #718096; line-height: 1.4; }

        /* --- КНОПКИ И ИНПУТЫ --- */
        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #e2e8f0;
            white-space: nowrap;
        }

        .btn-edit { background: #fff; color: #333; }
        .btn-edit:hover { background: #f8fafc; border-color: #cbd5e0; }

        .btn-save { background: #000; color: #fff; border-color: #000; }
        .btn-save:hover { background: #333; }

        .table-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: #fcfcfc;
            margin-bottom: 8px;
            display: block;
        }
        .table-input:focus { border-color: #000; background: #fff; }

        /* Увеличиваем минимальную ширину первой колонки в режиме редактирования */
        td:first-child {
            min-width: 120px; /* Дает кнопке "Выбрать файл" пространство */
        }

        /* На мобилках делаем еще свободнее */
        @media (max-width: 600px) {
            td:first-child {
                width: 100% !important;
                min-width: unset;
            }
        }

        /* --- АДАПТИВНОСТЬ --- */
        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); box-shadow: 15px 0 30px rgba(0,0,0,0.1); }
            .main-content { margin-left: 0; padding: 100px 20px 40px; }
            .mobile-header { display: flex; }
        }

        @media (max-width: 600px) {
            td div[style*="display: flex"] {
                flex-direction: column; /* Кнопки станут одна под другой на телефонах */
                width: 100%;
            }
        }

        @media (max-width: 600px) {
            th { display: none; }
            td {
                display: block;
                padding: 12px 24px;
                border: none;
                text-align: left;
            }
            tr { border-bottom: 8px solid #f4f7f6; display: block; padding: 10px 0; }
            .cat-img { width: 100%; height: 150px; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay"></div>

    <div class="mobile-header">
        <span style="font-weight: 600; font-size: 16px;">KUAT ADMIN</span>
        <div class="burger" id="burgerBtn"><span></span><span></span><span></span></div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">МЕНЮ УПРАВЛЕНИЯ</div>
        <ul class="sidebar-menu">
            <li><a href="main.html">Главная страница</a></li>
            <li><a href="category.html">Категории продуктов</a></li>
            <li><a href="products.html" class="active-link">Продукты</a></li>
            <li><a href="requests.html">Заявки</a></li>
            <li><a href="footer.html">Footer / Контакты</a></li>
            <li><a href="partners.html">Партнеры</a></li>
            <li><a href="change_password.html">Смена пароля</a></li>
        </ul>
        <button class="logout-btn" onclick="handleLogout()">Выйти из системы</button>
    </aside>

    <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h1>Управление продуктами</h1>
            <button class="btn btn-save" onclick="openAddProductModal()">+ Добавить продукт</button>
        </div>

        <div id="products-container">
            <div style="text-align:center; padding:40px; color:#999;">Загрузка данных...</div>
        </div>
    </main>

<div class="sidebar-overlay" id="modalOverlay" style="z-index: 4000;"></div>

<div id="addProductModal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; z-index: 4001; width: 90%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
    <h2 style="margin-bottom: 20px; font-size: 18px; font-weight: 600;">Новый продукт</h2>

    <div style="display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label style="font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 5px;">Название</label>
            <input type="text" id="new-prod-name" class="table-input" placeholder="Например: Шарнир поворотный">
        </div>

        <div>
            <label style="font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 5px;">Категория</label>
            <select id="new-prod-cat" class="table-input" style="cursor: pointer;"></select>
        </div>

        <div>
            <label style="font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 5px;">Описание</label>
            <textarea id="new-prod-desc" class="table-input" rows="3" placeholder="Краткие характеристики товара"></textarea>
        </div>

        <div>
            <label style="font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase;">Изображение</label>
            <input type="file" id="new-prod-file" style="display: block; margin-top: 10px;">
        </div>

        <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
            <button class="btn btn-edit" onclick="closeProductModal()">Отмена</button>
            <button class="btn btn-save" id="btn-create-prod" onclick="createProduct()">Создать</button>
        </div>
    </div>
</div>

</body>
    <script>
    const API_CATEGORIES = 'https://kuat-admin.com/api/categories/';
    const API_PRODUCTS = 'https://kuat-admin.com/api/products/';

    // --- МОБИЛЬНОЕ МЕНЮ ---
    const burgerBtn = document.getElementById('burgerBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    function toggleMenu() {
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }
    burgerBtn?.addEventListener('click', toggleMenu);
    overlay?.addEventListener('click', toggleMenu);

    // --- ЗАГРУЗКА ДАННЫХ ---
    async function loadData() {
        try {
            const [resCats, resProds] = await Promise.all([
                authorizedFetch(API_CATEGORIES),
                authorizedFetch(API_PRODUCTS)
            ]);
            if (!resCats.ok || !resProds.ok) throw new Error("Ошибка API");

            const categories = await resCats.json();
            const products = await resProds.json();
            renderProductsByCategories(categories, products);
        } catch (e) {
            console.error(e);
            document.getElementById('products-container').innerHTML = '<div style="text-align:center; padding:40px; color:red;">Ошибка загрузки</div>';
        }
    }

    // --- ОТРИСОВКА ---
    function renderProductsByCategories(categories, products) {
        const container = document.getElementById('products-container');
        if (categories.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">Сначала создайте категории</div>';
            return;
        }

        container.innerHTML = categories.map(cat => {
            const catProducts = products.filter(p => p.category === cat.id);
            return `
                <div style="margin-bottom: 40px;">
                    <h2 style="font-size: 18px; margin-bottom: 15px; border-left: 4px solid #000; padding-left: 15px;">
                        ${cat.name} <span style="color: #999; font-weight: 400; font-size: 14px;">(${catProducts.length})</span>
                    </h2>
                    <div class="table-card">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 80px;">Фото</th>
                                    <th>Название</th>
                                    <th>Описание</th>
                                    <th style="text-align: right; width: 180px;">Действие</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${catProducts.length > 0 ? catProducts.map(prod => `
                                    <tr id="prod-row-${prod.id}">
                                        <td><img src="${prod.image || 'https://via.placeholder.com/50'}" class="cat-img" id="img-p-${prod.id}"></td>
                                        <td id="name-p-${prod.id}" style="font-weight:600;">${prod.name}</td>
                                        <td id="desc-p-${prod.id}" style="color:#666; font-size:13px;">${prod.description || ''}</td>
                                        <td style="text-align: right;">
                                            <div id="actions-p-${prod.id}" style="display: flex; gap: 8px; justify-content: flex-end;">
                                                <button class="btn btn-edit" onclick="toggleEditProduct(${prod.id}, '${prod.name.replace(/'/g, "\\'")}', '${(prod.description || '').replace(/'/g, "\\'")}', ${cat.id})">Изменить</button>
                                                <button class="btn" style="color:#ff4444; border-color:#ff4444;" onclick="deleteProduct(${prod.id})">Удалить</button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('') : '<tr><td colspan="4" style="text-align:center; padding:20px; color:#ccc;">Нет товаров</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }).join('');
    }

    // --- РЕДАКТИРОВАНИЕ ---
    async function toggleEditProduct(id, name, desc, currentCatId) {
        const nameCell = document.getElementById(`name-p-${id}`);
        const descCell = document.getElementById(`desc-p-${id}`);
        const actionsCell = document.getElementById(`actions-p-${id}`);
        const imgCell = document.getElementById(`prod-row-${id}`).cells[0];

        const res = await authorizedFetch(API_CATEGORIES);
        const categories = await res.json();
        const options = categories.map(c => `<option value="${c.id}" ${c.id === currentCatId ? 'selected' : ''}>${c.name}</option>`).join('');

        nameCell.innerHTML = `
            <input type="text" id="edit-name-${id}" class="table-input" value="${name}">
            <select id="edit-cat-${id}" class="table-input">${options}</select>
        `;
        descCell.innerHTML = `<textarea id="edit-desc-${id}" class="table-input" rows="3">${desc}</textarea>`;
        imgCell.innerHTML += `<input type="file" id="edit-file-${id}" style="display:none" onchange="alert('Файл выбран')">
                              <button class="btn-edit" style="font-size:9px; width:100%; margin-top:5px;" onclick="document.getElementById('edit-file-${id}').click()">Сменить фото</button>`;

        actionsCell.innerHTML = `
            <button class="btn btn-save" onclick="saveProduct(${id})">OK</button>
            <button class="btn btn-edit" onclick="loadData()">Отмена</button>
        `;
    }

    async function saveProduct(id) {
        const formData = new FormData();
        formData.append('name', document.getElementById(`edit-name-${id}`).value);
        formData.append('category', document.getElementById(`edit-cat-${id}`).value);
        formData.append('description', document.getElementById(`edit-desc-${id}`).value);
        const file = document.getElementById(`edit-file-${id}`).files[0];
        if (file) formData.append('image', file);

        const res = await authorizedFetch(`${API_PRODUCTS}${id}/`, { method: 'PATCH', body: formData });
        if (res.ok) loadData();
        else alert("Ошибка сохранения");
    }

    // --- УДАЛЕНИЕ ---
    async function deleteProduct(id) {
        if (!confirm("Удалить этот продукт?")) return;
        const res = await authorizedFetch(`${API_PRODUCTS}${id}/`, { method: 'DELETE' });
        if (res.ok) loadData();
    }

    // --- ДОБАВЛЕНИЕ ПРОДУКТА ---
// --- ОТКРЫТИЕ МОДАЛКИ ---
async function openAddProductModal() {
    try {
        // 1. Загружаем категории для выпадающего списка
        const res = await authorizedFetch(API_CATEGORIES);
        if (!res.ok) throw new Error("Ошибка загрузки категорий");
        const cats = await res.json();

        const select = document.getElementById('new-prod-cat');
        select.innerHTML = cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

        // 2. Показываем модалку и оверлей
        document.getElementById('addProductModal').style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'block';
        document.getElementById('modalOverlay').classList.add('active');
    } catch (e) {
        alert("Не удалось открыть форму: " + e.message);
    }
}

// --- ЗАКРЫТИЕ МОДАЛКИ ---
function closeProductModal() {
    document.getElementById('addProductModal').style.display = 'none';
    const overlay = document.getElementById('modalOverlay');
    overlay.style.display = 'none';
    overlay.classList.remove('active');

    // Очищаем поля формы
    document.getElementById('new-prod-name').value = '';
    document.getElementById('new-prod-desc').value = '';
    document.getElementById('new-prod-cat').value = '';
    document.getElementById('new-prod-file').value = ''; // Очистка файла
}

// Слушаем клик по оверлею и вызываем функцию закрытия
document.getElementById('modalOverlay').onclick = closeProductModal;

// --- СОЗДАНИЕ ПРОДУКТА ---
async function createProduct() {
    const btn = document.getElementById('btn-create-prod');

    // Получаем данные из полей
    const name = document.getElementById('new-prod-name').value.trim();
    const cat = document.getElementById('new-prod-cat').value;
    const desc = document.getElementById('new-prod-desc').value.trim();
    const fileInput = document.getElementById('new-prod-file');
    const file = fileInput.files[0]; // Берем сам файл

    // Валидация
    if (!name || !cat || !file) {
        alert("Заполните название, выберите категорию и добавьте фото");
        return;
    }

    // Подготовка данных для отправки (FormData обязателен для файлов)
    const formData = new FormData();
    formData.append('name', name);
    formData.append('category', cat);
    formData.append('description', desc);
    formData.append('image', file);

    // Визуальная блокировка кнопки
    btn.disabled = true;
    btn.textContent = 'Отправка...';

    try {
        const res = await authorizedFetch(API_PRODUCTS, {
            method: 'POST',
            body: formData
        });

        if (res.ok) {
            closeProductModal();
            loadData(); // Перерисовываем список товаров на странице
        } else {
            const err = await res.json();
            alert("Ошибка сервера: " + JSON.stringify(err));
        }
    } catch (e) {
        alert("Ошибка сети при создании продукта");
    } finally {
        btn.disabled = false;
        btn.textContent = 'Создать';
    }
}

    function handleLogout() { localStorage.clear(); window.location.href = 'index.html'; }
    document.addEventListener('DOMContentLoaded', loadData);
    </script>
</html>
