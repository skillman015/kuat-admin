<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Изменить пароль</title>
    <script src="static/js/auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
    /* --- БАЗОВЫЕ СТИЛИ --- */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', sans-serif;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background-color: #f9f9f9;
        color: #333;
        display: flex;
        min-height: 100vh;
        overflow-x: hidden;
    }

    h1 { font-size: 24px; margin-bottom: 25px; font-weight: 600; }

    /* --- САЙДБАР --- */
    .sidebar {
        width: 280px;
        background-color: #fff;
        border-right: 1px solid #eee;
        display: flex;
        flex-direction: column;
        padding: 30px 20px;
        position: fixed;
        height: 100vh;
        left: 0; top: 0;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 3000;
    }

    .sidebar-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.4);
        z-index: 2500;
    }

    .sidebar-overlay.active { display: block; }

    .sidebar-header {
        font-weight: 600;
        font-size: 14px;
        color: #aaa;
        letter-spacing: 1.5px;
        margin-bottom: 30px;
        padding-left: 15px;
    }

    .sidebar-menu { list-style: none; flex-grow: 1; }
    .sidebar-menu li { margin-bottom: 8px; }
    .sidebar-menu a {
        text-decoration: none;
        color: #555;
        font-size: 15px;
        font-weight: 500;
        padding: 14px 18px;
        display: block;
        border-radius: 10px;
        transition: 0.2s;
    }

    .sidebar-menu a.active-link { background-color: #000; color: #fff; }
    .sidebar-menu a:hover:not(.active-link) { background-color: #f0f0f0; }

    .logout-btn {
        width: 100%;
        background-color: #f0f0f0;
        color: #ff4444;
        padding: 14px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        margin-top: 20px;
    }

    /* --- ОСНОВНОЙ КОНТЕНТ --- */
    .main-content {
        flex-grow: 1;
        margin-left: 280px;
        padding: 40px;
        transition: 0.3s;
        width: 100%;
    }

    .mobile-header {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        background: #fff;
        padding: 15px 20px;
        border-bottom: 1px solid #eee;
        z-index: 2000;
        justify-content: space-between;
        align-items: center;
        height: 70px;
    }

    .burger {
        width: 40px; height: 40px;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        gap: 5px; cursor: pointer;
    }
    .burger span { width: 24px; height: 2px; background: #000; border-radius: 2px; }

    /* --- ТАБЛИЦА (FIXED LAYOUT) --- */
    .table-container {
        background: #fff;
        border-radius: 15px;
        border: 1px solid #eee;
        overflow: hidden;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed; /* Фиксирует ширину колонок */
    }

    th {
        background: #fafafa;
        padding: 18px 25px;
        text-align: left;
        font-size: 12px;
        color: #999;
        text-transform: uppercase;
        border-bottom: 1px solid #eee;
    }

    td {
        padding: 20px 25px;
        border-bottom: 1px solid #eee;
        font-size: 15px;
        word-wrap: break-word; /* Перенос длинного текста */
    }

    /* Пропорции колонок */
    th:nth-child(1), td:nth-child(1) { width: 25%; }
    th:nth-child(2), td:nth-child(2) { width: 60%; }
    th:nth-child(3), td:nth-child(3) { width: 15%; text-align: right; }

    /* --- КНОПКИ И ИНПУТЫ --- */
    .edit-btn, .save-btn {
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        white-space: nowrap;
    }

    .edit-btn { background: #fff; border: 1px solid #eee; color: #333; }
    .edit-btn:hover { background: #f9f9f9; }

    .save-btn { background: #000; border: 1px solid #000; color: #fff; }

    .table-input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        outline: none;
        background: #fcfcfc;
        display: block;
        box-sizing: border-box;
    }
    .table-input:focus { border-color: #000; background: #fff; }

    /* --- АДАПТИВНОСТЬ (ПЛАНШЕТЫ И МОБИЛКИ) --- */
    @media (max-width: 992px) {
        .sidebar { transform: translateX(-100%); }
        .sidebar.active { transform: translateX(0); box-shadow: 15px 0 30px rgba(0,0,0,0.1); }
        .main-content { margin-left: 0; padding: 100px 20px 40px; }
        .mobile-header { display: flex; }
    }

    /* Адаптивная таблица в карточки */
    @media (max-width: 600px) {
        table { table-layout: auto; }
        thead { display: none; }

        table, tbody, tr, td { display: block; width: 100% !important; }

        tr { padding: 20px; border-bottom: 2px solid #f0f0f0; }

        td {
            padding: 10px 0;
            border: none;
            display: flex;
            flex-direction: column;
            text-align: left !important;
        }

        td::before {
            content: attr(data-label);
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
        }

        td:last-child {
            align-items: flex-start;
            margin-top: 10px;
        }

        .edit-btn, .save-btn { width: 100%; }
    }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay"></div>

    <div class="mobile-header">
        <span style="font-weight: 600; font-size: 16px;">KUAT ADMIN</span>
        <div class="burger" id="burgerBtn">
            <span></span><span></span><span></span>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">МЕНЮ УПРАВЛЕНИЯ</div>
        <ul class="sidebar-menu">
            <li><a href="main.html">Главная страница</a></li>
            <li><a href="category.html">Категории продуктов</a></li>
            <li><a href="products.html">Продукты</a></li>
            <li><a href="requests.html">Заявки</a></li>
            <li><a href="footer.html">Footer / Контакты</a></li>
            <li><a href="partners.html">Партнеры</a></li>
            <li><a href="change_password.html" class="active-link">Смена пароля</a></li>
        </ul>

        <button class="logout-btn" onclick="handleLogout()">Выйти из системы</button>
    </aside>

   <main class="main-content">
    <h1>Смена пароля</h1>

    <div class="table-container" style="max-width: 600px;">
        <table>
            <thead>
                <tr>
                    <th style="width: 40%;"></th>
                    <th style="width: 60%;"></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><strong>Старый пароль</strong></td>
                    <td>
                        <input type="password" id="old-password" class="table-input" placeholder="Введите старый пароль">
                    </td>
                </tr>
                <tr>
                    <td><strong>Новый пароль</strong></td>
                    <td>
                        <input type="password" id="new-password" class="table-input" placeholder="Минимум 8 символов">
                    </td>
                </tr>
                <tr>
                    <td><strong>Повторите пароль</strong></td>
                    <td>
                        <input type="password" id="confirm-password" class="table-input" placeholder="Повторите новый пароль">
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: right; padding: 25px;">
                        <button class="save-btn" id="btn-change-pass" onclick="submitChangePassword()" style="width: 200px;">
                            Обновить пароль
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div id="message-box" style="margin-top: 20px; font-size: 14px; display: none; padding: 15px; border-radius: 10px;"></div>
</main>

<script>
    const API_CHANGE_PASSWORD = 'https://kuat-admin.com/api/change-password/';

    // --- МОБИЛЬНОЕ МЕНЮ ---
    const burgerBtn = document.getElementById('burgerBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    function toggleMenu() {
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }
    burgerBtn?.addEventListener('click', toggleMenu);
    overlay?.addEventListener('click', toggleMenu);

    // --- СМЕНА ПАРОЛЯ ---
    async function submitChangePassword() {
        const oldPass = document.getElementById('old-password').value;
        const newPass = document.getElementById('new-password').value;
        const confirmPass = document.getElementById('confirm-password').value;
        const btn = document.getElementById('btn-change-pass');
        const msgBox = document.getElementById('message-box');

        // 1. Валидация на клиенте
        if (!oldPass || !newPass) {
            showNotice("Пожалуйста, заполните все поля", "#fff5f5", "#c53030");
            return;
        }

        if (newPass !== confirmPass) {
            showNotice("Новые пароли не совпадают", "#fff5f5", "#c53030");
            return;
        }

        if (newPass.length < 8) {
            showNotice("Новый пароль слишком короткий (мин. 8 символов)", "#fff5f5", "#c53030");
            return;
        }

        // 2. Подготовка запроса
        btn.disabled = true;
        btn.textContent = 'Обновление...';

        try {
            const res = await authorizedFetch(API_CHANGE_PASSWORD, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    old_password: oldPass,
                    new_password: newPass
                })
            });

            const data = await res.json();

            if (res.ok) {
                showNotice("Пароль успешно изменен! Перенаправление...", "#f0fff4", "#22543d");

                // Очистка полей
                document.querySelectorAll('.table-input').forEach(i => i.value = '');

                // Согласно примечанию, после смены пароля лучше перезайти
                setTimeout(() => {
                    handleLogout();
                }, 2000);
            } else {
                // Вывод ошибки от сервера (например, "Старый пароль неверен")
                const errorMsg = data.detail || data.old_password || "Ошибка при смене пароля";
                showNotice(errorMsg, "#fff5f5", "#c53030");
            }
        } catch (e) {
            showNotice("Ошибка сети или сервера", "#fff5f5", "#c53030");
        } finally {
            btn.disabled = false;
            btn.textContent = 'Обновить пароль';
        }
    }

    // Вспомогательная функция для уведомлений
    function showNotice(text, bgColor, textColor) {
        const box = document.getElementById('message-box');
        box.style.display = 'block';
        box.style.backgroundColor = bgColor;
        box.style.color = textColor;
        box.textContent = text;

        // Скрыть через 5 секунд, если это не успех
        if (bgColor !== "#f0fff4") {
            setTimeout(() => { box.style.display = 'none'; }, 5000);
        }
    }

    function handleLogout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
