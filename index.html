<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="static/js/auth.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .logo-text {
            font-size: 35px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            color: #000;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 12px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background-color: #fcfcfc;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #000;
            background-color: #fff;
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px; /* Фиксируем высоту, чтобы кнопка не прыгала при появлении спиннера */
        }

        .login-button:hover {
            opacity: 0.8;
        }

        .login-button:disabled {
            background-color: #333;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* --- СТИЛИ СПИННЕРА --- */
        .spinner {
            display: none; /* По умолчанию скрыт */
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff; /* Цвет крутящейся части (белый на черном фоне) */
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-text {
            margin-top: 40px;
            font-size: 12px;
            color: #aaa;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-text">Kuat Solutions</div>

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" name="username" placeholder="Логин" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="Пароль" required>
            </div>

            <div id="error-message" style="display: none; color: #ff4444; font-size: 13px; margin-bottom: 15px; background: #fff5f5; padding: 10px; border-radius: 8px;"></div>

            <button type="submit" class="login-button" id="submit-btn">
                <span id="btn-text">Войти</span>
                <div class="spinner" id="btn-spinner"></div>
            </button>
            <p class="footer-text">© RA–2026</p>
        </form>
    </div>

   <script>
        const form = document.getElementById('loginForm');
        const errorBox = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Сброс стилей
            errorBox.style.display = 'none';
            document.querySelectorAll('input').forEach(i => i.style.borderColor = '#e0e0e0');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showError("Введите логин и пароль");
                return;
            }

            // --- ВКЛЮЧАЕМ СОСТОЯНИЕ ЗАГРУЗКИ ---
            submitBtn.disabled = true;
            btnText.style.display = 'none';    // Скрываем текст "Войти"
            btnSpinner.style.display = 'block'; // Показываем спиннер

            try {
                const response = await fetch('https://kuat-admin.com/api/token/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    window.location.href = 'main_page.html';
                } else {
                    let message = "Ошибка входа";
                    if (response.status === 401 || response.status === 400) {
                        message = "Неверный логин или пароль";
                    } else {
                        message = data.detail || "Произошла ошибка на сервере";
                    }
                    showError(message);

                    // Возвращаем кнопку в исходное состояние при ошибке
                    resetButton();
                }
            } catch (error) {
                console.error("Network error:", error);
                showError("Ошибка сети. Проверьте соединение с сервером.");
                resetButton();
            }
        });

        // Функция возврата кнопки
        function resetButton() {
            submitBtn.disabled = false;
            btnText.style.display = 'block';
            btnSpinner.style.display = 'none';
        }

        function showError(text) {
            errorBox.textContent = text;
            errorBox.style.display = 'block';
            document.querySelectorAll('input').forEach(i => {
                if (!i.value) i.style.borderColor = '#ff4444';
            });
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                errorBox.style.display = 'none';
                input.style.borderColor = '#e0e0e0';
            });
        });
    </script>
</body>
</html>
